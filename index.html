<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노인스포츠지도사(보디빌딩) 구술시험 플래시카드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#111827;color:#e5e7eb;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 60px}
h1{font-size:1.2rem;margin:14px 0 3px;color:#93c5fd;letter-spacing:-.5px;text-align:center}
.subtitle{font-size:.7rem;color:#6b7280;margin-bottom:4px;text-align:center}
.exam-info{font-size:.7rem;color:#f59e0b;background:#78350f22;border:1px solid #78350f;border-radius:8px;padding:6px 14px;margin-bottom:12px;text-align:center}

/* 탭 */
.tabs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;max-width:660px;width:100%}
.tab{padding:4px 11px;border-radius:99px;border:1.5px solid #374151;background:transparent;color:#9ca3af;font-size:.7rem;cursor:pointer;transition:all .2s}
.tab.active{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd;font-weight:700}

/* 진행 */
.progress-bar{width:100%;max-width:660px;height:4px;background:#1f2937;border-radius:99px;margin-bottom:5px}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:99px;transition:width .4s}
.progress-row{display:flex;justify-content:space-between;width:100%;max-width:660px;font-size:.68rem;color:#6b7280;margin-bottom:10px}

/* 통계 패널 */
.stats-panel{width:100%;max-width:660px;background:#1f2937;border:1px solid #374151;border-radius:14px;padding:12px 16px;margin-bottom:12px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.stat-item{text-align:center}
.stat-val{font-size:1.2rem;font-weight:700}
.stat-label{font-size:.6rem;color:#9ca3af;margin-top:1px}
.sv-g{color:#22c55e}.sv-y{color:#f59e0b}.sv-r{color:#ef4444}.sv-b{color:#60a5fa}.sv-p{color:#a78bfa}

/* 카드 */
.card-wrapper{width:100%;max-width:660px;height:265px;perspective:1200px;cursor:pointer;margin-bottom:12px}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;width:100%;height:100%;border-radius:16px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;text-align:center}
.front{background:linear-gradient(135deg,#1e2d45,#1a2035);border:1.5px solid #2d4a70}
.back{background:linear-gradient(135deg,#1a1f2e,#1e2035);border:1.5px solid #3d3060;transform:rotateY(180deg)}
.card-cat{font-size:.65rem;padding:2px 10px;border-radius:99px;background:#1e3a5f;color:#60a5fa;margin-bottom:10px}
.card-freq{font-size:.62rem;padding:2px 8px;border-radius:99px;margin-bottom:8px}
.freq-high{background:#7f1d1d44;color:#f87171;border:1px solid #f8717133}
.freq-mid{background:#78350f44;color:#fbbf24;border:1px solid #fbbf2433}
.card-q{font-size:1rem;font-weight:700;line-height:1.65;color:#e8f0ff}
.card-hint{font-size:.66rem;color:#4b5563;margin-top:10px}
.card-a{font-size:.85rem;line-height:1.75;color:#d1d5db;text-align:left;width:100%;overflow-y:auto;max-height:200px}
.card-a strong{color:#93c5fd}
.card-a .red{color:#f87171}
.card-a .green{color:#86efac}
.card-a .yellow{color:#fde68a}

/* 키워드 */
.kw-area{width:100%;max-width:660px;margin-bottom:8px;min-height:30px}
.kw-label{font-size:.65rem;color:#6b7280;margin-bottom:4px}
.kw-list{display:flex;flex-wrap:wrap;gap:4px}
.kw{padding:2px 9px;border-radius:99px;font-size:.7rem;font-weight:600;border:1.5px solid #374151;color:#9ca3af;transition:all .3s}
.kw.hit{background:#14532d44;border-color:#22c55e;color:#22c55e}
.kw.miss{background:#7f1d1d44;border-color:#ef4444;color:#ef4444}

/* 음성 */
.voice-row{display:flex;gap:8px;align-items:center;width:100%;max-width:660px;margin-bottom:6px}
.mic-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#8b5cf6);font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px #3b82f644}
.mic-btn.listening{background:linear-gradient(135deg,#ef4444,#f97316);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #ef444466}50%{box-shadow:0 0 0 8px #ef444400}}
.transcript{flex:1;background:#1f2937;border:1.5px solid #374151;border-radius:10px;padding:8px 12px;font-size:.8rem;color:#9ca3af;min-height:40px;line-height:1.5}
.transcript.active{color:#e5e7eb}
.voice-res{font-size:.7rem;margin-bottom:8px;color:#6b7280;width:100%;max-width:660px;min-height:16px}
.voice-res.ok{color:#22c55e}.voice-res.ng{color:#f59e0b}

/* 채점 */
.score-row{display:flex;gap:7px;width:100%;max-width:660px;margin-bottom:10px}
.sb{flex:1;padding:7px;border-radius:9px;border:none;font-size:.75rem;font-weight:600;cursor:pointer;opacity:.35;transition:opacity .2s}
.sb.active{opacity:1}
.sb-g{background:#14532d33;color:#22c55e;border:1.5px solid #22c55e55}
.sb-y{background:#78350f33;color:#f59e0b;border:1.5px solid #f59e0b55}
.sb-r{background:#7f1d1d33;color:#ef4444;border:1.5px solid #ef444455}

/* 내비 */
.nav-row{display:flex;gap:7px;align-items:center;margin-bottom:8px}
.btn{padding:8px 18px;border-radius:10px;border:none;font-size:.82rem;font-weight:600;cursor:pointer}
.btn-p{background:#1f2937;color:#9ca3af}
.btn-n{background:#3b82f6;color:#fff}
.btn-sh{background:#8b5cf622;color:#a78bfa;border:1.5px solid #8b5cf644;font-size:.7rem;padding:6px 12px;border-radius:8px;cursor:pointer}
.btn-wrong{background:#7f1d1d33;color:#f87171;border:1.5px solid #f8717133;font-size:.7rem;padding:6px 12px;border-radius:8px;cursor:pointer}

.hint-bar{font-size:.63rem;color:#374151;margin-top:12px;text-align:center;line-height:1.8}
</style>
</head>
<body>

<h1>노인스포츠지도사(보디빌딩) 구술시험</h1>
<p class="subtitle">실제 시험 구성에 맞춘 빈출 문제 카드</p>
<div class="exam-info">📋 구술 4문제 구성 · 노인1 · 보디빌딩규정/포즈 1~2 · 생리학/역학/도핑 1</div>

<div class="tabs" id="tabs"></div>
<div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
<div class="progress-row"><span id="pText"></span><span id="pCatText" style="color:#a78bfa"></span></div>

<div class="stats-panel">
  <div class="stat-item"><div class="stat-val sv-g" id="stG">0</div><div class="stat-label">알았어요</div></div>
  <div class="stat-item"><div class="stat-val sv-y" id="stY">0</div><div class="stat-label">애매해요</div></div>
  <div class="stat-item"><div class="stat-val sv-r" id="stR">0</div><div class="stat-label">몰랐어요</div></div>
  <div class="stat-item"><div class="stat-val sv-b" id="stRate">-</div><div class="stat-label">정답률</div></div>
  <div class="stat-item"><div class="stat-val sv-p" id="stLeft">-</div><div class="stat-label">미채점</div></div>
</div>

<div class="card-wrapper" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face front">
      <div class="card-cat" id="fCat"></div>
      <div class="card-freq" id="fFreq"></div>
      <div class="card-q" id="fQ"></div>
      <div class="card-hint">탭하면 답 보기</div>
    </div>
    <div class="face back">
      <div class="card-cat" id="bCat"></div>
      <div class="card-a" id="bA"></div>
    </div>
  </div>
</div>

<div class="kw-area" id="kwArea" style="display:none">
  <div class="kw-label">핵심 키워드 — 초록: 말했어요 / 빨강: 빠뜨렸어요</div>
  <div class="kw-list" id="kwList"></div>
</div>

<div class="voice-row">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="transcript" id="transcript">마이크 누르고 답 말해보기</div>
</div>
<div class="voice-res" id="voiceRes"></div>

<div class="score-row">
  <button class="sb sb-g" onclick="score('g')">✅ 알았어요</button>
  <button class="sb sb-y" onclick="score('y')">🤔 애매해요</button>
  <button class="sb sb-r" onclick="score('r')">❌ 몰랐어요</button>
</div>

<div class="nav-row">
  <button class="btn btn-p" onclick="move(-1)">← 이전</button>
  <button class="btn-sh" onclick="shuffle()">🔀 섞기</button>
  <button class="btn-wrong" onclick="filterWrong()">❌만 보기</button>
  <button class="btn btn-n" onclick="move(1)">다음 →</button>
</div>

<p class="hint-bar">← → 이동 &nbsp;|&nbsp; Space 뒤집기 &nbsp;|&nbsp; 1 알았어요 &nbsp; 2 애매해요 &nbsp; 3 몰랐어요 &nbsp;|&nbsp; 음성인식: Chrome/Safari</p>

<script>
// freq: 'high'=필수빈출, 'mid'=자주출제, ''=기본
const CARDS = [

/* ══════════════════════════════════════════
   ★ 노인체육론 (구술 1번 문제 영역)
══════════════════════════════════════════ */
{cat:"노인체육론",freq:"high",q:"낙상(Fall)의 원인과 예방 운동을 설명하세요.",
a:`<strong>내적 원인</strong>: 근력 약화, 균형감각 저하, 시력·청력 저하, 약물 부작용<br>
<strong>외적 원인</strong>: 미끄러운 바닥, 장애물, 조명 부족<br><br>
<strong>예방 운동</strong>: 하지 근력 강화 + 균형 훈련 (한발 서기, 탠덤 워크)<br>
<strong>환경 개선</strong>: 미끄럼 방지 매트, 안전 손잡이 설치`,
kw:["낙상","근력약화","균형","내적원인","외적원인","하지강화","탠덤워크"]},

{cat:"노인체육론",freq:"high",q:"사르코페니아(근감소증)의 정의·기준·예방법은?",
a:`<strong>정의</strong>: 노화로 인해 근육량·근력·근기능이 점진적으로 감소하는 증후군<br><br>
<strong>기준 (3가지 중 해당):</strong><br>
① 근육량 감소<br>② 악력 저하 (남 26kg↓, 여 18kg↓)<br>③ 보행속도 저하 (0.8m/s↓)<br><br>
<strong>예방</strong>: 저항성 운동 주 2~3회 + 단백질 충분 섭취 (1.2g/kg 이상)`,
kw:["사르코페니아","근감소증","근육량","악력","보행속도","저항성운동","단백질"]},

{cat:"노인체육론",freq:"high",q:"노화에 따른 신체적 변화 5가지를 설명하세요.",
a:`① <strong>근력 감소</strong>: 속근섬유(Type II) 우선 감소<br>
② <strong>심폐기능 저하</strong>: 최대심박수·VO₂max 감소<br>
③ <strong>유연성 저하</strong>: 콜라겐 탄성 감소, 관절 가동범위 축소<br>
④ <strong>골밀도 감소</strong>: 골다공증 위험 증가<br>
⑤ <strong>균형·협응 저하</strong>: 전정기관·고유감각 기능 저하 → 낙상 위험`,
kw:["속근","VO₂max","콜라겐","골밀도","전정기관","고유감각","균형"]},

{cat:"노인체육론",freq:"high",q:"노인 운동처방의 FITT 원칙을 설명하세요.",
a:`<strong>F</strong>(빈도): 유산소 주 3~5회, 저항성 주 2~3회<br>
<strong>I</strong>(강도): 중강도 - 최대심박수 40~70%, RPE 11~13<br>
<strong>T</strong>(시간): 1회 20~60분 (초기 10분부터 시작)<br>
<strong>T</strong>(형태): 유산소 + 저항성 + 유연성 복합 구성`,
kw:["FITT","빈도","강도","시간","형태","RPE","중강도","40~70%"]},

{cat:"노인체육론",freq:"mid",q:"노인 운동 지도의 기본 원칙 4가지는?",
a:`① <strong>개별화</strong>: 건강상태·체력 수준에 맞게 처방<br>
② <strong>점진성</strong>: 강도·시간·빈도를 서서히 높임<br>
③ <strong>안전성</strong>: 부상·낙상 예방 최우선<br>
④ <strong>지속성</strong>: 꾸준한 참여 유도, 동기 부여`,
kw:["개별화","점진성","안전성","지속성","동기"]},

{cat:"노인체육론",freq:"mid",q:"골다공증의 정의와 권장 운동은?",
a:`<strong>정의</strong>: 뼈의 밀도와 질이 감소하여 골절 위험이 높아지는 질환<br><br>
<strong>권장 운동</strong>:<br>
① 체중 부하 운동 (걷기·계단·댄스) → 뼈에 기계적 자극<br>
② 저항성 운동 → 근력으로 뼈 보호<br>
③ 균형 운동 → 낙상·골절 예방<br><br>
<span class='red'>⚠ 수영·자전거는 골밀도 개선 효과 낮음</span>`,
kw:["골다공증","골밀도","체중부하","기계적자극","저항성","균형","골절"]},

{cat:"노인체육론",freq:"mid",q:"대사증후군의 진단 기준과 운동 효과는?",
a:`<strong>진단 기준 (5가지 중 3가지 이상):</strong><br>
복부비만 / 혈압 130/85↑ / 공복혈당 100↑ / 중성지방 150↑ / HDL 감소<br><br>
<strong>운동 효과</strong>: 체지방 감소, 혈압 조절, 인슐린 감수성 증가, HDL 증가`,
kw:["대사증후군","복부비만","혈압","혈당","중성지방","HDL","인슐린감수성"]},

{cat:"노인체육론",freq:"mid",q:"노인 운동 시 절대 금기와 상대 금기 사항은?",
a:`<strong class='red'>절대 금기</strong>: 불안정 협심증 / 안정시 혈압 180/110↑ / 급성 심부전 / 심근경색 직후<br><br>
<strong class='yellow'>상대 금기</strong>: 조절 안 된 당뇨(혈당 300↑) / 심한 관절염 / 발열·급성 감염`,
kw:["절대금기","상대금기","협심증","180/110","심부전","심근경색","당뇨300"]},

{cat:"노인체육론",freq:"mid",q:"노인의 심리적 변화와 운동의 심리적 효과는?",
a:`<strong>심리적 변화</strong>: 우울감 증가, 자존감 저하, 고독감, 인지 저하<br><br>
<strong>운동 효과</strong>:<br>
① 세로토닌·도파민·엔도르핀 분비 → 우울감 감소<br>
② 자기효능감(Self-efficacy) 향상<br>
③ 사회적 교류 → 고독감 해소`,
kw:["우울","세로토닌","도파민","엔도르핀","자기효능감","고독","사회적교류"]},

{cat:"노인체육론",freq:"",q:"치매 예방을 위한 운동 효과와 추천 운동은?",
a:`<strong>효과</strong>: 해마 부피 증가, BDNF(뇌신경성장인자) 분비 → 인지기능 개선<br><br>
<strong>추천 운동</strong>: 유산소 운동 / 이중과제 운동 (걸으면서 숫자 세기) / 협응·균형 운동`,
kw:["치매","해마","BDNF","인지기능","이중과제","유산소"]},

/* ══════════════════════════════════════════
   ★★ 보디빌딩 대회 규정 (구술 2~3번 핵심)
══════════════════════════════════════════ */
{cat:"보디빌딩 대회규정",freq:"high",q:"보디빌딩 7가지 규정 포즈의 이름을 모두 말하세요.",
a:`① <strong>프론트 더블 바이셉스</strong> (Front Double Biceps)<br>
② <strong>프론트 랫 스프레드</strong> (Front Lat Spread)<br>
③ <strong>사이드 체스트</strong> (Side Chest)<br>
④ <strong>백 더블 바이셉스</strong> (Back Double Biceps)<br>
⑤ <strong>백 랫 스프레드</strong> (Back Lat Spread)<br>
⑥ <strong>사이드 트라이셉스</strong> (Side Triceps)<br>
⑦ <strong>어브도미널 앤 대퇴</strong> (Abdominals & Thighs)`,
kw:["프론트더블바이셉스","프론트랫스프레드","사이드체스트","백더블바이셉스","백랫스프레드","사이드트라이셉스","어브도미널앤대퇴"]},

{cat:"보디빌딩 대회규정",freq:"high",q:"프론트 더블 바이셉스 포즈의 자세와 심사 부위는?",
a:`<strong>자세</strong>:<br>
정면을 보며 양팔을 어깨 높이로 들어 90° 굽힘 → 이두근 최대 수축<br>
한쪽 발 살짝 앞으로 → 대퇴사두근·종아리 수축<br><br>

{cat:"운동생리학",freq:"high",q:"목표 심박수 계산 방법 (카보넨 공식)을 설명하세요.",
a:`<strong>최대심박수</strong> = 220 − 나이<br><br>
<strong>카보넨 공식 (Karvonen)</strong>:<br>
목표 심박수 = (최대심박수 − 안정시심박수) × 강도% + 안정시심박수<br><br>
<strong>예시</strong> (70세, 안정시 심박수 70bpm, 강도 60%):<br>
최대심박수 = 220-70 = <b>150</b><br>
목표 = (150-70) × 0.6 + 70 = <b class='green'>118 bpm</b><br><br>
<strong>노인 권장 강도</strong>: 40~70% (초기 40%부터 점진)`,

a:`<strong>증상</strong>: 식은땀, 손떨림, 어지러움, 두통, 의식 혼탁<br><br>
<strong>의식 있을 때</strong>:<br>
① 즉시 운동 중단<br>
② <b>당분 즉시 섭취</b>: 주스 150mL, 사탕 3~4개, 포도당 정제<br>
③ 15분 후 재확인 → 호전 없으면 반복<br>

② <span class='red'>음식물 주지 않기</span> (기도 막힘 위험)<br>

kw:["저혈당","식은땀","손떨림","당분섭취","주스","사탕","포도당","119","기도막힘"]},

];// end CARDS

// ─── 상태 ────────────────────────────────────────
let all = [...CARDS], filtered = [...CARDS], idx = 0, flipped = false;
const scores = {};
let activeFilter = '전체';
const cats = ['전체','노인체육론','보디빌딩 대회규정','도핑','응급처치','운동생리학','운동역학·해부학','트레이닝론','스포츠심리학','스포츠 윤리'];

// ─── 음성 인식 ────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false;
function toggleMic(){
  if(!SR){alert('Chrome 또는 Safari를 사용해 주세요.');return;}
  if(listening){rec.stop();return;}
  rec = new SR();
  rec.lang='ko-KR';rec.continuous=false;rec.interimResults=true;
  rec.onstart=()=>{listening=true;document.getElementById('micBtn').classList.add('listening');document.getElementById('micBtn').textContent='⏹';const t=document.getElementById('transcript');t.textContent='듣고 있어요...';t.classList.remove('active');clearKw();};
  rec.onresult=(e)=>{let txt='';for(let r of e.results)txt+=r[0].transcript;const t=document.getElementById('transcript');t.textContent=txt;t.classList.add('active');};
  rec.onend=()=>{listening=false;document.getElementById('micBtn').classList.remove('listening');document.getElementById('micBtn').textContent='🎤';const spoken=document.getElementById('transcript').textContent;if(spoken&&spoken!=='듣고 있어요...')checkKw(spoken);};
  rec.onerror=()=>{listening=false;document.getElementById('micBtn').classList.remove('listening');document.getElementById('micBtn').textContent='🎤';};
  rec.start();
}
function checkKw(spoken){
  const card=filtered[idx];const txt=spoken.replace(/\s/g,'');
  document.getElementById('kwArea').style.display='block';
  const list=document.getElementById('kwList');list.innerHTML='';
  let hits=0;
  card.kw.forEach(k=>{const b=document.createElement('span');b.className='kw';b.textContent=k;const found=txt.includes(k.replace(/\s/g,''))||spoken.includes(k);if(found){b.classList.add('hit');hits++;}else{b.classList.add('miss');}list.appendChild(b);});
  const pct=Math.round(hits/card.kw.length*100);
  const res=document.getElementById('voiceRes');
  if(pct>=70){res.textContent=`키워드 ${hits}/${card.kw.length}개 (${pct}%) — 잘 했어요!`;res.className='voice-res ok';}
  else{res.textContent=`키워드 ${hits}/${card.kw.length}개 (${pct}%) — 빨간 키워드를 더 말해보세요`;res.className='voice-res ng';}
}
function clearKw(){document.getElementById('kwArea').style.display='none';document.getElementById('kwList').innerHTML='';document.getElementById('voiceRes').textContent='';document.getElementById('voiceRes').className='voice-res';}

// ─── 렌더 ────────────────────────────────────────
function render(){
  const c=filtered[idx];
  document.getElementById('fCat').textContent=c.cat;
  document.getElementById('bCat').textContent=c.cat;
  document.getElementById('fQ').textContent=c.q;
  document.getElementById('bA').innerHTML=c.a;
  // 빈출 배지
  const fEl=document.getElementById('fFreq');
  if(c.freq==='high'){fEl.textContent='🔥 필수 빈출';fEl.className='card-freq freq-high';}
  else if(c.freq==='mid'){fEl.textContent='⭐ 자주 출제';fEl.className='card-freq freq-mid';}
  else{fEl.textContent='';fEl.className='card-freq';}

  const pct=((idx+1)/filtered.length*100).toFixed(0);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pText').textContent=`${idx+1} / ${filtered.length}`;
  document.getElementById('pCatText').textContent=c.cat;

  flipped=false;document.getElementById('card').classList.remove('flipped');
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('active'));
  const s=scores[c.q];if(s)document.querySelector(`.sb-${s}`)?.classList.add('active');
  clearKw();
  const tr=document.getElementById('transcript');tr.textContent='마이크 누르고 답 말해보기';tr.classList.remove('active');
  updateStats();
}
function flipCard(){flipped=!flipped;document.getElementById('card').classList.toggle('flipped',flipped);}
function move(dir){if(listening)rec?.stop();idx=(idx+dir+filtered.length)%filtered.length;render();}
function shuffle(){filtered.sort(()=>Math.random()-.5);idx=0;render();}
function filterWrong(){
  const wrong=all.filter(c=>scores[c.q]==='r');
  if(wrong.length===0){alert('❌ 몰랐어요로 표시한 카드가 없어요!');return;}
  filtered=wrong;idx=0;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  render();
}
function score(type){
  scores[filtered[idx].q]=type;
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.sb-${type}`)?.classList.add('active');
  updateStats();
}
function updateStats(){
  const sv=Object.values(scores);
  const g=sv.filter(v=>v==='g').length;
  const y=sv.filter(v=>v==='y').length;
  const r=sv.filter(v=>v==='r').length;
  const total=g+y+r;
  const left=all.length-total;
  document.getElementById('stG').textContent=g;
  document.getElementById('stY').textContent=y;
  document.getElementById('stR').textContent=r;
  document.getElementById('stRate').textContent=total>0?Math.round(g/total*100)+'%':'-';
  document.getElementById('stLeft').textContent=left;
}

// ─── 탭 ─────────────────────────────────────────
function initTabs(){
  const bar=document.getElementById('tabs');
  cats.forEach(c=>{
    const cnt=c==='전체'?all.length:all.filter(x=>x.cat===c).length;
    const b=document.createElement('button');
    b.textContent=`${c} (${cnt})`;
    b.className='tab'+(c===activeFilter?' active':'');
    b.onclick=()=>{
      activeFilter=c;
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      filtered=c==='전체'?[...all]:all.filter(x=>x.cat===c);
      idx=0;render();
    };
    bar.appendChild(b);
  });
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')move(1);
  if(e.key==='ArrowLeft')move(-1);
  if(e.key===' '){e.preventDefault();flipCard();}
  if(e.key==='1')score('g');
  if(e.key==='2')score('y');
  if(e.key==='3')score('r');
});

initTabs();render();
</script>
</body>
</html>
